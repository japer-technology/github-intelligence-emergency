# Disable All Intelligences – Emergency Workflow
#
# Triggered when DELETE-TO-DISABLE-ALL-INTELLIGENCES.md is deleted.
# Moves .github/workflows/*.yml → .github/workflows-DISABLED/ in every
# org repo that contains a .github-*-intelligence folder.
#
# Fail-safe: while DELETE-TO-ACTIVATE.md exists only a dry-run receipt
# is written to dry-run-log/.

name: 🆘 Disable All Intelligences

on:
  push:
    paths:
      - 'DELETE-TO-DISABLE-ALL-INTELLIGENCES.md'

permissions:
  contents: write

jobs:
  disable:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verify trigger file was deleted
        id: verify
        run: |
          if git diff --name-only --diff-filter=D HEAD~1 HEAD | grep -q '^DELETE-TO-DISABLE-ALL-INTELLIGENCES\.md$'; then
            echo "deleted=true" >> "$GITHUB_OUTPUT"
          else
            echo "deleted=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DELETE-TO-DISABLE-ALL-INTELLIGENCES.md was not deleted – skipping."
          fi

      - name: Determine dry-run mode
        if: steps.verify.outputs.deleted == 'true'
        id: mode
        run: |
          if [ -f "DELETE-TO-ACTIVATE.md" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Fail-safe active – DELETE-TO-ACTIVATE.md still exists. Running in DRY-RUN mode."
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Fail-safe removed – executing LIVE disable of all intelligences."
          fi

      - name: Run disable script
        if: steps.verify.outputs.deleted == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.INTELLIGENCE_EMERGENCY_TOKEN || secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ steps.mode.outputs.dry_run }}
          OWNER: ${{ github.repository_owner }}
        run: |
          chmod +x scripts/disable-all-intelligences.sh
          bash scripts/disable-all-intelligences.sh

      - name: Commit dry-run receipt
        if: steps.verify.outputs.deleted == 'true' && steps.mode.outputs.dry_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dry-run-log/ || true
          if git diff --cached --quiet; then
            echo "No receipt to commit."
          else
            git commit -m "🆘 Dry-run receipt: disable all intelligences"
            git push
          fi

      - name: Commit execution receipt
        if: steps.verify.outputs.deleted == 'true' && steps.mode.outputs.dry_run == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add EXECUTED-DISABLE-*.log || true
          if git diff --cached --quiet; then
            echo "No receipt to commit."
          else
            git commit -m "🆘 Execution receipt: disable all intelligences"
            git push
          fi
