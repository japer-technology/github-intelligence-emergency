# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  GitHub Intelligence Emergency — Agent Workflow (Version 1.0.0)              ║
# ║                                                                              ║
# ║  Account-wide emergency control for intelligence repositories.               ║
# ║  Provides last-line-of-defence workflow modification and deletion for        ║
# ║  total agent control across all repos with .github-*-intelligence folders.   ║
# ║                                                                              ║
# ║  QUICK START — copy this file into your repo and you're 3 steps away:        ║
# ║                                                                              ║
# ║    1. Copy this file → .github/workflows/ in your repository.                ║
# ║    2. Add a repository secret named INTELLIGENCE_EMERGENCY_TOKEN             ║
# ║       containing a Personal Access Token (PAT) with `repo` scope             ║
# ║       across the organisation.                                               ║
# ║       (Settings → Secrets and variables → Actions).                          ║
# ║    3. Run the workflow manually:                                             ║
# ║       Actions → github-intelligence-emergency-agent → Run workflow.          ║
# ║       This installs the emergency scripts, trigger files, and copies         ║
# ║       the remaining workflows into .github/workflows-new/ for you to         ║
# ║       move into .github/workflows/ manually.                                 ║
# ║                                                                              ║
# ║  WHAT THIS WORKFLOW CONTAINS (two jobs):                                     ║
# ║    run-install   — Self-installer and upgrader (workflow_dispatch only).     ║
# ║    run-gitpages  — Publishes the emergency public-fabric to GitHub Pages.    ║
# ║                                                                              ║
# ║  NOTE: The other three workflow files (trigger-disable, trigger-kill,        ║
# ║  dry-run) are copied to .github/workflows-new/ during installation.          ║
# ║  You must manually move them to .github/workflows/ to activate them.         ║
# ║                                                                              ║
# ║  Docs: https://github.com/japer-technology/github-intelligence-emergency     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: github-intelligence-emergency-agent

# ──────────────────────────────────────────────────────────────────────────────
# TRIGGERS
# ──────────────────────────────────────────────────────────────────────────────
on:
  # 1. Code is pushed to main → triggers a GitHub Pages deployment so the
  #    emergency public-fabric site stays up to date.
  push:
    branches: ["main"]
    paths-ignore:
      - ".github/workflows/**"

  # 2. Manual "Run workflow" button → installs the emergency system into your
  #    repository, or upgrades it when a newer version is available.
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────────────────────
# PERMISSIONS
# ──────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write
  pages: write
  id-token: write

# ══════════════════════════════════════════════════════════════════════════════
# JOBS
# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — run-install
  #
  # Purpose : Self-installer and upgrader. Downloads the emergency system
  #           from the template repository and installs scripts, trigger
  #           files, and dry-run-log into YOUR repo. Copies the three
  #           companion workflow files into .github/workflows-new/ so you
  #           can move them to .github/workflows/ manually.
  # Trigger : workflow_dispatch (manual "Run workflow" button only).
  # Safe    : Re-running is always safe — it installs, upgrades, or skips.
  # ────────────────────────────────────────────────────────────────────────────
  run-install:
    runs-on: ubuntu-latest
    # Only run when triggered manually via the Actions UI.
    # Skip when running inside the template repository itself.
    if: >-
      github.event_name == 'workflow_dispatch'
      && github.repository != 'japer-technology/github-intelligence-emergency'
    steps:

      # 1. Check out the repository so we can inspect and modify its contents.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      # 2. Determine whether to install, upgrade, or skip.
      #    • No scripts/ folder → action=install
      #    • scripts/ present, local VERSION < template VERSION → action=upgrade
      #    • scripts/ present, local VERSION >= template VERSION → action=skip
      - name: Check for existing installation
        id: check-install
        run: |
          if [ ! -d "scripts" ] || [ ! -f "DELETE-TO-ACTIVATE.md" ]; then
            echo "action=install" >> "$GITHUB_OUTPUT"
            echo "📦 Emergency system not found — will install."
          else
            LOCAL_VERSION="0.0.0"
            if [ -f "VERSION" ]; then
              LOCAL_VERSION=$(tr -d '[:space:]' < VERSION)
            fi

            # Fetch only the VERSION file from the template repository.
            REMOTE_VERSION=$(curl -fsSL "https://raw.githubusercontent.com/japer-technology/github-intelligence-emergency/main/VERSION" | tr -d '[:space:]' || true)

            if [ -z "$REMOTE_VERSION" ]; then
              echo "::warning::Could not fetch remote VERSION — skipping upgrade check."
              echo "action=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Local VERSION:  $LOCAL_VERSION"
            echo "Remote VERSION: $REMOTE_VERSION"

            # Validate that both versions look like semver (digits and dots).
            SEMVER_RE='^[0-9]+\.[0-9]+\.[0-9]+$'
            if ! [[ "$LOCAL_VERSION" =~ $SEMVER_RE ]] || ! [[ "$REMOTE_VERSION" =~ $SEMVER_RE ]]; then
              echo "::warning::VERSION format is not valid semver — skipping upgrade check."
              echo "action=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Compare semver components (major.minor.patch).
            IFS='.' read -r L_MAJOR L_MINOR L_PATCH <<< "$LOCAL_VERSION"
            IFS='.' read -r R_MAJOR R_MINOR R_PATCH <<< "$REMOTE_VERSION"

            NEEDS_UPGRADE=false
            if [ "$R_MAJOR" -gt "$L_MAJOR" ]; then
              NEEDS_UPGRADE=true
            elif [ "$R_MAJOR" -eq "$L_MAJOR" ] && [ "$R_MINOR" -gt "$L_MINOR" ]; then
              NEEDS_UPGRADE=true
            elif [ "$R_MAJOR" -eq "$L_MAJOR" ] && [ "$R_MINOR" -eq "$L_MINOR" ] && [ "$R_PATCH" -gt "$L_PATCH" ]; then
              NEEDS_UPGRADE=true
            fi

            if [ "$NEEDS_UPGRADE" = true ]; then
              echo "action=upgrade" >> "$GITHUB_OUTPUT"
              echo "⬆️  Upgrade available: $LOCAL_VERSION → $REMOTE_VERSION"
            else
              echo "action=skip" >> "$GITHUB_OUTPUT"
              echo "✅ Local version ($LOCAL_VERSION) >= remote version ($REMOTE_VERSION) — nothing to do."
            fi
          fi

      # 3. Download the template repository as a zip, extract it, and either
      #    install fresh or upgrade the existing emergency system.
      #    On fresh install: copies scripts, trigger files, and dry-run-log.
      #    Copies companion workflows to .github/workflows-new/.
      #    On upgrade: preserves dry-run-log contents and existing trigger
      #    state (DELETE-TO-*.md files that have already been deleted stay
      #    deleted).
      - name: Download and install from template
        if: steps.check-install.outputs.action != 'skip'
        run: |
          set -euo pipefail

          ACTION="${{ steps.check-install.outputs.action }}"

          # Download the latest template from the main branch.
          curl -fsSL "https://github.com/japer-technology/github-intelligence-emergency/archive/refs/heads/main.zip" \
            -o /tmp/template.zip
          unzip -q /tmp/template.zip -d /tmp/template

          EXTRACTED=$(ls -d /tmp/template/github-intelligence-emergency-*)

          if [ "$ACTION" = "upgrade" ]; then
            # Back up user state before replacing framework files.
            BACKUP="/tmp/emergency-backup"
            mkdir -p "$BACKUP"
            if [ -d "dry-run-log" ]; then cp -R dry-run-log "$BACKUP/dry-run-log"; fi

            # Note which DELETE-TO-*.md files are already absent (already triggered).
            for f in DELETE-TO-ACTIVATE.md DELETE-TO-DISABLE-ALL-INTELLIGENCES.md DELETE-TO-KILL-ALL-INTELLIGENCES.md; do
              if [ ! -f "$f" ]; then
                touch "$BACKUP/.deleted-$f"
              fi
            done

            # Replace scripts from template.
            rm -rf scripts
            cp -R "$EXTRACTED/scripts" scripts

            # Restore trigger files from template, then re-delete any that
            # were already triggered (absent) in the user's repo.
            for f in DELETE-TO-ACTIVATE.md DELETE-TO-DISABLE-ALL-INTELLIGENCES.md DELETE-TO-KILL-ALL-INTELLIGENCES.md; do
              cp "$EXTRACTED/$f" "$f"
              if [ -f "$BACKUP/.deleted-$f" ]; then
                rm -f "$f"
              fi
            done

            # Restore dry-run-log from backup (preserves existing receipts).
            if [ -d "$BACKUP/dry-run-log" ]; then
              rm -rf dry-run-log
              cp -R "$BACKUP/dry-run-log" dry-run-log
            fi
          else
            # Fresh install — copy everything from the template (except public-fabric).
            cp -R "$EXTRACTED/scripts" scripts
            cp -R "$EXTRACTED/dry-run-log" dry-run-log

            for f in DELETE-TO-ACTIVATE.md DELETE-TO-DISABLE-ALL-INTELLIGENCES.md DELETE-TO-KILL-ALL-INTELLIGENCES.md; do
              cp "$EXTRACTED/$f" "$f"
            done
          fi

          # Copy VERSION file.
          if [ -f "$EXTRACTED/VERSION" ]; then
            cp "$EXTRACTED/VERSION" VERSION
          fi

          # Copy README.md from template.
          cp "$EXTRACTED/README.md" README.md

          # ── Copy companion workflow files to .github/workflows-new/ ──
          # These must be manually moved to .github/workflows/ by the user.
          mkdir -p .github/workflows-new
          for wf in github-intelligence-emergency-trigger-disable.yml \
                    github-intelligence-emergency-trigger-kill.yml \
                    github-intelligence-emergency-dry-run.yml; do
            if [ -f "$EXTRACTED/.github/workflows/$wf" ]; then
              cp "$EXTRACTED/.github/workflows/$wf" ".github/workflows-new/$wf"
              echo "📋 Copied $wf → .github/workflows-new/"
            fi
          done

          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "  ⚠️  IMPORTANT: Move the workflow files to activate them!"
          echo ""
          echo "  The following files have been placed in .github/workflows-new/"
          echo "  and must be moved to .github/workflows/ manually:"
          echo ""
          if [ -d .github/workflows-new/ ] && [ -n "$(ls -A .github/workflows-new/ 2>/dev/null)" ]; then
            ls .github/workflows-new/ | sed 's/^/    • /'
          else
            echo "    (none found in template)"
          fi
          echo ""
          echo "════════════════════════════════════════════════════════════════"

      # 4. Ensure common ignore patterns are present in .gitignore.
      - name: Ensure .gitignore entries
        if: steps.check-install.outputs.action != 'skip'
        run: |
          touch .gitignore
          for entry in ".DS_Store"; do
            grep -qxF "$entry" .gitignore || echo "$entry" >> .gitignore
          done

      # 5. Commit and push. Uses the appropriate message for install vs upgrade.
      - name: Commit and push
        if: steps.check-install.outputs.action != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          ACTION="${{ steps.check-install.outputs.action }}"
          VERSION="unknown"
          if [ -f "VERSION" ]; then
            VERSION=$(tr -d '[:space:]' < VERSION)
          fi
          if [ "$ACTION" = "upgrade" ]; then
            COMMIT_MSG="chore: upgrade github-intelligence-emergency to v${VERSION}"
          else
            COMMIT_MSG="chore: install github-intelligence-emergency v${VERSION}"
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "$COMMIT_MSG"
            git push
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — run-gitpages
  #
  # Purpose : Publish the emergency system's public-fabric directory as a
  #           GitHub Pages site. This gives you a live status page — no
  #           separate hosting needed.
  # Trigger : push to main (i.e. after install, or any manual push).
  # Note    : Pages is automatically enabled on first run. If auto-enable
  #           fails, a warning guides the user to enable it manually.
  # ────────────────────────────────────────────────────────────────────────────
  run-gitpages:
    needs: [run-install]
    # always() ensures the job runs even when upstream jobs are skipped;
    # !cancelled() still respects manual cancellation.
    if: always() && !cancelled() && github.repository != 'japer-technology/github-intelligence-emergency'
    runs-on: ubuntu-latest

    concurrency:
      group: "pages-emergency"
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check public-fabric exists
        id: check-folder
        run: |
          if [ -d "public-fabric" ]; then
            echo "folder_exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ public-fabric directory found."
          else
            echo "folder_exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Directory public-fabric not found. Skipping Pages deployment. Run the installer first (Actions → Run workflow)."
          fi

      - name: Enable Pages
        if: steps.check-folder.outputs.folder_exists == 'true'
        id: enable-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" --silent 2>/dev/null; then
            echo "pages_active=true" >> "$GITHUB_OUTPUT"
            echo "✅ GitHub Pages is already enabled."
          elif gh api "repos/${{ github.repository }}/pages" \
            -X POST -f build_type=workflow --silent 2>/dev/null; then
            echo "pages_active=true" >> "$GITHUB_OUTPUT"
            echo "✅ GitHub Pages has been enabled."
          else
            echo "pages_active=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not enable GitHub Pages automatically. Please enable it manually in repository Settings → Pages → Source → GitHub Actions."
          fi

      - name: Setup Pages
        if: steps.check-folder.outputs.folder_exists == 'true' && steps.enable-pages.outputs.pages_active == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.check-folder.outputs.folder_exists == 'true' && steps.enable-pages.outputs.pages_active == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'public-fabric'

      - name: Deploy to GitHub Pages
        if: steps.check-folder.outputs.folder_exists == 'true' && steps.enable-pages.outputs.pages_active == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
